<!doctype html>
<html lang="en">
<head>
  <meta charset="utf-8" />
  <link rel="preconnect" href="https://fonts.googleapis.com" />
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
  <link href="https://fonts.googleapis.com/css2?family=Literata:ital,opsz,wght@0,7..72,400..700;1,7..72,400..700&family=Archivo:wght@400..900&family=Archivo+Narrow:wght@500..700&family=IBM+Plex+Mono:wght@400;500&display=swap" rel="stylesheet">
  <style>
    * { box-sizing: border-box; margin: 0; padding: 0; }
    html, body { width: 1200px; height: 630px; overflow: hidden; }
    body {
      font-family: Archivo, system-ui, sans-serif;
      background: #FFFFFF;
      color: #111111;
      padding: 78px 90px;
      position: relative;
    }
    .eyebrow {
      font-size: 18px;
      font-weight: 600;
      letter-spacing: 0.14em;
      text-transform: uppercase;
      color: #111111;
      margin-bottom: 38px;
    }
    h1 {
      font-family: Literata, Georgia, serif;
      font-weight: 400;
      font-size: 80px;
      line-height: 1.05;
      letter-spacing: -0.018em;
      max-width: 16ch;
      color: #111111;
    }
    h1 em {
      font-style: italic;
      color: #555555;
      font-weight: 300;
    }
    .overlay-tag {
      display: inline-block;
      margin-top: 30px;
      font-family: Literata, Georgia, serif;
      font-style: italic;
      font-size: 24px;
      color: #111111;
      border-top: 1px solid #111111;
      padding-top: 12px;
    }
    .meta {
      position: absolute;
      bottom: 78px;
      left: 90px;
      right: 90px;
      display: flex;
      justify-content: space-between;
      align-items: flex-end;
      font-size: 17px;
      letter-spacing: 0.05em;
      color: #555555;
    }
    .meta .url {
      font-family: Literata, Georgia, serif;
      font-style: italic;
      font-size: 22px;
      color: #333333;
    }
    .topo {
      position: absolute;
      top: 78px;
      right: 90px;
      width: 220px;
      height: 110px;
      opacity: 0.55;
    }
  </style>
</head>
<body>
  <div class="eyebrow">Land Selection Framework — v1 sketch</div>
  <h1>Eight criteria for siting <em>a regenerative settlement.</em></h1>
  <div class="overlay-tag">with active filters · shared view</div>

  <svg class="topo" viewBox="0 0 220 110">
    <path d="M0 70 C 35 50, 60 80, 95 60 S 160 35, 220 55"
          stroke="#111111" stroke-width="2" fill="none" stroke-linecap="round"/>
    <path d="M0 88 C 40 70, 75 92, 110 78 S 175 60, 220 75"
          stroke="#111111" stroke-width="1.6" fill="none" stroke-linecap="round" opacity="0.7"/>
    <path d="M0 100 C 45 88, 90 102, 130 92 S 195 80, 220 90"
          stroke="#111111" stroke-width="1.2" fill="none" stroke-linecap="round" opacity="0.45"/>
  </svg>

  <div class="meta">
    <span>land.regencommunity.tools</span>
    <span class="url">v1 · May 2026</span>
  </div>
</body>
</html>

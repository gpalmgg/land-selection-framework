<!doctype html>
<html lang="en">
<head>
  <meta charset="utf-8" />
  <link rel="preconnect" href="https://fonts.googleapis.com" />
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
  <link href="https://fonts.googleapis.com/css2?family=Inter:wght@500;600&family=Spectral:ital,wght@0,400;1,300&display=swap" rel="stylesheet" />
  <style>
    * { box-sizing: border-box; margin: 0; padding: 0; }
    html, body { width: 1200px; height: 630px; overflow: hidden; }
    body {
      font-family: 'Inter', system-ui, sans-serif;
      background:
        radial-gradient(ellipse at 85% 18%, rgba(138, 58, 42, 0.10) 0%, transparent 55%),
        radial-gradient(ellipse at 8% 82%, rgba(44, 95, 124, 0.10) 0%, transparent 50%),
        #f6f2eb;
      color: #1a1a1a;
      padding: 78px 90px;
      position: relative;
    }
    .eyebrow {
      font-size: 18px;
      font-weight: 600;
      letter-spacing: 0.14em;
      text-transform: uppercase;
      color: #8a3a2a;
      margin-bottom: 38px;
    }
    h1 {
      font-family: 'Spectral', Georgia, serif;
      font-weight: 400;
      font-size: 88px;
      line-height: 1.04;
      letter-spacing: -0.02em;
      max-width: 14ch;
      color: #1a1a1a;
    }
    h1 em {
      font-style: italic;
      color: #6b6258;
      font-weight: 300;
    }
    .subline {
      position: absolute;
      bottom: 168px;
      left: 90px;
      right: 90px;
      font-family: 'Spectral', Georgia, serif;
      font-style: italic;
      font-weight: 300;
      font-size: 24px;
      line-height: 1.4;
      color: #3a3a3a;
      max-width: 36ch;
    }
    .meta {
      position: absolute;
      bottom: 78px;
      left: 90px;
      right: 90px;
      display: flex;
      justify-content: space-between;
      align-items: flex-end;
      font-size: 17px;
      letter-spacing: 0.05em;
      color: #6b6258;
    }
    .meta .url {
      font-family: 'Spectral', Georgia, serif;
      font-style: italic;
      font-size: 22px;
      color: #3a3a3a;
    }
    .topo {
      position: absolute;
      top: 78px;
      right: 90px;
      width: 220px;
      height: 110px;
      opacity: 0.55;
    }
  </style>
</head>
<body>
  <div class="eyebrow">Land Selection Framework — In Depth</div>
  <h1>The framework, <em>in depth.</em></h1>

  <svg class="topo" viewBox="0 0 220 110">
    <path d="M0 70 C 35 50, 60 80, 95 60 S 160 35, 220 55"
          stroke="#8a3a2a" stroke-width="2" fill="none" stroke-linecap="round"/>
    <path d="M0 88 C 40 70, 75 92, 110 78 S 175 60, 220 75"
          stroke="#8a3a2a" stroke-width="1.6" fill="none" stroke-linecap="round" opacity="0.7"/>
    <path d="M0 100 C 45 88, 90 102, 130 92 S 195 80, 220 90"
          stroke="#8a3a2a" stroke-width="1.2" fill="none" stroke-linecap="round" opacity="0.45"/>
  </svg>

  <p class="subline">
    Methodology, three regional case studies, and the questions still being worked through.
  </p>

  <div class="meta">
    <span>land.regencommunity.tools / deeper</span>
    <span class="url">v1 · May 2026</span>
  </div>
</body>
</html>
